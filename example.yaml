name: "CLI Agent OpenAI Client"
version: "1.0.0"

settings:
  debug: false
  verbose: true

openai:
  # Required: OpenAI API base URL
  base_url: "https://.../v1"

  # Required: Your OpenAI API key
  api_key: ""

  # HTTP client configuration
  http_client:
    timeout: 120              # Request timeout in seconds
    max_retries: 3            # Maximum number of retries
    retry_delay: 1000         # Delay between retries in milliseconds

# Model configuration
model:
  # Model to use for chat and agent (optional, default: "glm-4.7")
  model: "glm-4.7"

  # Sampling temperature (optional, default: 0.7)
  # 0.0 - 2.0, higher values make output more random
  temperature: 0.7

  # Maximum tokens to generate (optional, default: 128000)
  max_tokens: 2048

  # Nucleus sampling threshold (optional, default: 1.0)
  # 0.0 - 1.0, lower values make output more focused
  top_p: 1.0

  # System message for chat/agent context (optional, default: "")
  # This message is sent at the beginning of each session to set context
  system: "You are a helpful coding assistant. Use <do>...</do> tags to wrap bash commands you want to execute."

execution:
  # Command execution engine (optional, default: empty for local execution)
  # Examples:
  #   - Local execution: ""
  #   - Docker: "docker run --rm -v $(pwd):/workspace -w /workspace ubuntu:latest bash -c"
  #   - Podman: "podman run --rm --userns keep-id alpine:latest sh -c"
  #   - Docker Compose: "docker compose exec -T app bash -c"
  #   - Custom wrapper: "my-wrapper --timeout 30 --verbose bash -c"
  engine: ""

  # Command execution timeout in seconds (optional, default: 30s)
  # 0 will be set to maximum which is several years
  timeout: 30s

agent:
  # Maximum number of agent turns before stopping (optional, default: 10)
  # Prevents infinite loops in case the agent doesn't terminate
  max_turns: 10
